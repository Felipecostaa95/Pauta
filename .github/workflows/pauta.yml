name: Pauta diaria

# La viralidad se juega en horas: tres corridas por día. Los items se
# acumulan (no se pisan) y la pauta del día se re-renderiza con lo nuevo.
on:
  schedule:
    - cron: "0 12 * * *" # 9:00 en Chile (UTC-3)
    - cron: "0 16 * * *" # 13:00 en Chile (UTC-3)
    - cron: "0 21 * * *" # 18:00 en Chile (UTC-3)
  workflow_dispatch: {}

concurrency:
  group: pauta
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pauta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install spacy
          python -m spacy download es_core_news_sm
          python -m spacy download en_core_web_sm
          python -m spacy download fr_core_news_sm

      - name: Correr pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py

      - name: Commit de la base acumulada y las pautas (data/ + reports/)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/pauta.db
          git add reports
          if git diff --staged --quiet; then
            echo "Sin cambios, no se commitea nada."
            exit 0
          fi
          git commit -m "Datos y pauta $(date -u +%Y-%m-%d)"

          # Push robusto: el monitor de última hora corre cada 15 min y toca el
          # mismo reports/index.html, así que a las horas en punto (cuando este
          # workflow y el monitor coinciden) el rebase choca en el reporte. Lo
          # resolvemos a favor de ESTA corrida (-X theirs en rebase = nuestros
          # commits, que traen los spikes recién calculados). Nunca quedamos en
          # rebase a medias ni en detached HEAD.
          pushed=""
          for intento in 1 2 3 4 5; do
            git fetch origin main || { sleep 5; continue; }
            if git rebase -X theirs origin/main; then
              if git push origin HEAD:main; then pushed="si"; break; fi
            else
              git rebase --abort || true
            fi
            sleep $(( (RANDOM % 8) + 3 ))
          done

          if [ -z "$pushed" ]; then
            git rebase --abort 2>/dev/null || true
            echo "No se pudo pushear tras 5 intentos (sin romper el repo)." >&2
            exit 1
          fi

      - name: Subir reporte como artefacto de Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: reports

  deploy:
    needs: pauta
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
