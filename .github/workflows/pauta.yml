name: Pauta diaria

on:
  schedule:
    - cron: "0 12 * * *" # 9:00 en Chile (UTC-3)
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  pauta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install spacy
          python -m spacy download es_core_news_sm
          python -m spacy download en_core_web_sm
          python -m spacy download fr_core_news_sm

      - name: Correr pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run.py

      - name: Commit de la base acumulada (data/)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/*.db
          if git diff --staged --quiet; then
            echo "Sin cambios en data/, no se commitea nada."
          else
            git commit -m "Datos acumulados $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Subir reporte como artefacto de Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: reports

  deploy:
    needs: pauta
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
