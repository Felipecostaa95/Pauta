# Monitor de última hora — corre cada 15 minutos.
# Es liviano a propósito: solo Google News + Trends, sin YouTube ni spaCy pesado.
# Actualiza la banda "⚡ Última hora" del reporte sin tocar la pauta diaria.
name: Monitor última hora

on:
  schedule:
    # Cada 15 minutos. GitHub Actions no garantiza puntualidad al minuto exacto
    # en crons frecuentes (puede haber demoras en horas de mucha carga), pero
    # para un monitor de rupturas un desfase de unos minutos es irrelevante.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

# Evita que dos corridas se pisen si una tarda más de 15 min (raro, pero por
# las dudas): si ya hay una corriendo, la nueva espera o se cancela.
concurrency:
  group: breaking-monitor
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias mínimas
        # OJO: el monitor NO necesita spaCy ni sus modelos (que son lentos de
        # instalar). Solo requests + pyyaml. Esto hace que cada corrida sea de
        # segundos, no minutos — clave cuando corre 96 veces al día.
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Correr monitor de última hora
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python breaking_run.py

      - name: Commit del estado del monitor
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # SOLO la base propia del monitor y el reporte. NUNCA data/pauta.db:
          # ese archivo binario lo escribe la pauta diaria, y si el monitor lo
          # commiteara, git no podría fusionar las dos versiones y el rebase
          # reventaría ("Cannot merge binary files"). El monitor lee pauta.db
          # en solo-lectura (ver breaking_run.py), así que acá no aparece.
          git add -f data/breaking.db
          git add reports/

          if git diff --staged --quiet; then
            echo "Sin cambios, nada que commitear."
            exit 0
          fi
          git commit -m "Monitor última hora $(date -u +%Y-%m-%dT%H:%M)"

          # Push robusto con reintentos. La pauta diaria (u otra corrida del
          # monitor) puede haber pusheado mientras corríamos y tocado el mismo
          # reports/index.html. Rebaseamos sobre origin/main resolviendo ese
          # choque a favor del reporte que ACABAMOS de generar (en un rebase,
          # -X theirs = nuestros commits). Ante CUALQUIER fallo del rebase
          # abortamos limpio: nunca quedamos en rebase a medias ni en detached
          # HEAD (que era como terminaba el bug original).
          pushed=""
          for intento in 1 2 3 4 5; do
            git fetch origin main || { sleep 5; continue; }
            if git rebase -X theirs origin/main; then
              if git push origin HEAD:main; then pushed="si"; break; fi
              # push rechazado (otra corrida ganó la carrera): reintentar
            else
              git rebase --abort || true
            fi
            sleep $(( (RANDOM % 8) + 3 ))
          done

          if [ -z "$pushed" ]; then
            git rebase --abort 2>/dev/null || true
            echo "No se pudo pushear tras 5 intentos (sin romper el repo)." >&2
            exit 1
          fi

      - name: Subir reporte a Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

  deploy:
    needs: monitor
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
